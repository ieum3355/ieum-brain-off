name: Daily Data Scrape

on:
  schedule:
    # 매일 한국 시간 오전 9시 10분 (UTC 00:10)에 실행
    - cron: '10 0 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 레포지토리에 푸시하기 위해 필요

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unified Engine (v2.1)
        run: python brain_off_main.py

      - name: Commit and Push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/candidates.json public/dashboard_data.json public/market_index_cache.json
          git commit -m "chore: daily brain-off update v2.1 [skip ci]" || echo "No changes to commit"
          git push
